services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genbu
    restart: always
    networks:
      - traefik
    volumes:
      - /home/hanshino/data/tthol.sqlite:/app/tthol.sqlite:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.genbu.rule=Host(`genbu.hanshino.dev`)"
      - "traefik.http.routers.genbu.entrypoints=websecure"
      - "traefik.http.routers.genbu.tls=true"
      - "traefik.http.routers.genbu.tls.certresolver=leresolver"
      - "traefik.http.services.genbu.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
    name: traefik
